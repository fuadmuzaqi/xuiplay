<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Station</title>

  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Lewati ke konten</a>

  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-mark" aria-hidden="true">♪</div>
      <div>
        <p class="eyebrow">Music player</p>
        <h1 class="brand-title">Music Station</h1>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" id="eqToggleBtn" type="button" aria-label="Buka equalizer" aria-expanded="false" title="Equalizer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 21v-7"></path>
          <path d="M4 10V3"></path>
          <path d="M12 21v-4"></path>
          <path d="M12 10V3"></path>
          <path d="M20 21v-9"></path>
          <path d="M20 5V3"></path>
          <path d="M2 10h4"></path>
          <path d="M10 10h4"></path>
          <path d="M18 12h4"></path>
        </svg>
      </button>

      <button class="icon-btn" id="themeToggle" type="button" aria-label="Ganti tema" title="Ganti tema">☾</button>
    </div>
  </header>

  <main id="main-content" class="main-shell">
    <section class="player-card">
      <div class="now-block">
        <p class="eyebrow">Now playing</p>
        <h2 id="nowTitle">Belum ada lagu dipilih</h2>
        <p id="nowArtist" class="muted">Pilih lagu dari daftar di bawah</p>
      </div>

      <nav class="genre-inline" aria-label="Folder genre">
        <div id="genreTabs" class="genre-tabs"></div>
      </nav>

      <div class="time-wrap">
        <input
          id="progressBar"
          class="time-bar"
          type="range"
          min="0"
          max="100"
          value="0"
          step="0.1"
          aria-label="Posisi lagu"
        />
        <div class="time-meta">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
      </div>

      <div class="transport">
        <button id="prevBtn" class="transport-btn" type="button" aria-label="Lagu sebelumnya">⏮</button>
        <button id="playPauseBtn" class="play-btn" type="button" aria-label="Play atau pause">▶</button>
        <button id="nextBtn" class="transport-btn" type="button" aria-label="Lagu berikutnya">⏭</button>
      </div>

      <aside class="eq-panel" id="eqPanel" hidden>
        <div class="eq-head">
          <div>
            <p class="eyebrow">Equalizer</p>
            <h3>Preset visual</h3>
          </div>
          <div class="preset-pills">
            <button class="preset-btn active" data-preset="flat" type="button">Flat</button>
            <button class="preset-btn" data-preset="warm" type="button">Warm</button>
            <button class="preset-btn" data-preset="club" type="button">Club</button>
          </div>
        </div>

        <div class="eq-sliders" id="eqSliders"></div>
      </aside>
    </section>

    <section class="playlist-card">
      <div class="playlist-head">
        <div>
          <p class="eyebrow">Playlist</p>
          <h2 id="genreHeading">Semua genre</h2>
        </div>
        <p id="trackCount" class="muted">0 track</p>
      </div>

      <div id="playlistContainer" class="playlist-list"></div>
    </section>
  </main>

  <div id="youtube-player" class="yt-hidden" aria-hidden="true"></div>

  <script src="./js/app.js" defer></script>
</body>
</html>
