<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Music Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { background-color: #0b0f1a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .input-field { 
            background: #161b22; border: 1px solid #30363d; 
            color: #c9d1d9; border-radius: 6px; padding: 10px; width: 100%;
        }
        .btn-green { background: #238636; color: white; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-red { background: #da3633; color: white; padding: 8px; border-radius: 6px; font-size: 12px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .hidden { display: none; }
        .sortable-ghost { opacity: 0.4; background: #1e293b; }
        .handle { cursor: grab; color: #8b949e; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginSection" class="max-w-sm mx-auto mt-20 card text-center">
        <h1 class="text-2xl font-bold mb-6">Admin Access</h1>
        <input type="password" id="accessCode" class="input-field mb-4 text-center" placeholder="Enter Access Code">
        <button onclick="doLogin()" class="btn-green w-full">Login</button>
    </div>

    <div id="adminSection" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Master Station Control</h1>
            <button onclick="doLogout()" class="text-red-400 hover:underline">Logout</button>
        </div>

        <div class="card">
            <h2 class="text-lg font-bold mb-4 text-blue-400">Add New Track</h2>
            <form id="trackForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="url" id="yt_url" class="input-field md:col-span-2" placeholder="Paste YouTube URL..." required>
                <input type="text" id="t_title" class="input-field" placeholder="Track Title" required>
                <input type="text" id="t_artist" class="input-field" placeholder="Artist">
                <select id="t_genre" class="input-field" required></select>
                <input type="color" id="t_color" class="h-10 w-full bg-transparent border-none" value="#01696f">
                <button type="submit" class="btn-green md:col-span-2">Save Track</button>
            </form>
        </div>

        <div class="card">
            <h2 class="text-lg font-bold mb-4 text-green-400">Manage Genres</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="new_genre_name" class="input-field" placeholder="New Genre Name">
                <button onclick="addGenre()" class="btn-green whitespace-nowrap px-6">+ Add</button>
            </div>
            <div id="genreList" class="space-y-2"></div>
        </div>

        <h2 class="text-xl font-bold mb-4">Track Management</h2>
        <div id="trackManagerSection" class="space-y-6"></div>
    </div>

    <script>
        const capitalize = (s) => s.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        const toSlug = (s) => s.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');

        async function doLogin() {
            const code = document.getElementById('accessCode').value;
            const res = await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'login', code }) });
            if (res.ok) location.reload(); else alert('Invalid Code');
        }

        async function doLogout() {
            await fetch('/api/admin?action=logout');
            location.reload();
        }

        async function loadData() {
            const res = await fetch('/api/admin?action=getMasterData');
            if (!res.ok) return;
            const { genres, tracks } = await res.json();
            
            // Render Select Genre
            document.getElementById('t_genre').innerHTML = genres.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            
            // Render Genre Management
            document.getElementById('genreList').innerHTML = genres.map(g => `
                <div class="flex items-center gap-2 bg-[#0d1117] p-2 rounded">
                    <input type="text" value="${g.name}" class="input-field text-sm" onchange="updateGenre(${g.id}, this.value)">
                    <button onclick="deleteGenre(${g.id})" class="text-red-500 p-2">✕</button>
                </div>
            `).join('');

            // Render Track Manager (per Genre)
            const manager = document.getElementById('trackManagerSection');
            manager.innerHTML = '';

            genres.forEach(genre => {
                const genreTracks = tracks.filter(t => t.genre_id === genre.id).sort((a,b) => a.sort_order - b.sort_order);
                const section = document.createElement('div');
                section.className = 'card bg-[#0d1117]';
                section.innerHTML = `
                    <h3 class="font-bold border-b border-gray-700 pb-2 mb-4 text-gray-300 uppercase text-sm tracking-widest">${genre.name}</h3>
                    <div class="space-y-2 sortable-list" data-genre-id="${genre.id}">
                        ${genreTracks.map(t => `
                            <div class="flex items-center gap-3 bg-[#161b22] p-3 rounded border border-gray-800" data-id="${t.id}">
                                <span class="handle">⠿</span>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium truncate">${t.title}</p>
                                    <p class="text-xs text-gray-500 truncate">${t.artist || 'Unknown'}</p>
                                </div>
                                <button onclick="deleteTrack(${t.id})" class="text-red-400 text-xs">Delete</button>
                            </div>
                        `).join('')}
                    </div>
                `;
                manager.appendChild(section);

                // Initialize Drag & Drop
                new Sortable(section.querySelector('.sortable-list'), {
                    handle: '.handle',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    onEnd: (evt) => {
                        const items = Array.from(evt.to.children).map((el, index) => ({
                            id: el.dataset.id,
                            sort_order: index
                        }));
                        updateOrder(items);
                    }
                });
            });
        }

        // Action Functions
        async function addGenre() {
            const name = document.getElementById('new_genre_name').value;
            if(!name) return;
            await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'addGenre', name, slug: toSlug(name) }) });
            location.reload();
        }

        async function updateGenre(id, name) {
            await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'updateGenre', id, name, slug: toSlug(name) }) });
        }

        async function deleteGenre(id) {
            if(confirm('Hapus genre? Semua lagu di dalamnya akan ikut terhapus!')) {
                await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'deleteGenre', id }) });
                location.reload();
            }
        }

        async function deleteTrack(id) {
            if(confirm('Hapus lagu ini?')) {
                await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'deleteTrack', id }) });
                location.reload();
            }
        }

        async function updateOrder(items) {
            await fetch('/api/admin', { method: 'POST', body: JSON.stringify({ action: 'updateOrder', items }) });
        }

        // YouTube Auto-fill
        document.getElementById('yt_url').addEventListener('input', async (e) => {
            const url = e.target.value;
            if (url.includes('youtube.com/') || url.includes('youtu.be/')) {
                const res = await fetch(`/api/admin?action=fetchYoutube&url=${encodeURIComponent(url)}`);
                if (res.ok) {
                    const data = await res.json();
                    let [artist, title] = data.title.includes(' - ') ? data.title.split(' - ') : ['', data.title];
                    document.getElementById('t_title').value = capitalize(title.replace(/\(Official.*\)|\[.*\]/gi, '').trim());
                    document.getElementById('t_artist').value = capitalize(artist.trim());
                }
            }
        });

        document.getElementById('trackForm').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/admin', { method: 'POST', body: JSON.stringify({
                action: 'addTrack',
                genre_id: document.getElementById('t_genre').value,
                title: document.getElementById('t_title').value,
                artist: document.getElementById('t_artist').value,
                youtube_url: document.getElementById('yt_url').value,
                accent_color: document.getElementById('t_color').value
            })});
            location.reload();
        };

        async function init() {
            const res = await fetch('/api/admin?action=check');
            if(res.ok) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                loadData();
            }
        }
        init();
    </script>
</body>
</html>
