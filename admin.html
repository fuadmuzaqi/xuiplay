<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Studio — Batch Engine</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=boska@300,400,500,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --accent: #00f2ff;
      --input-bg: rgba(255, 255, 255, 0.02);
      --font-display: "Boska", serif;
      --font-body: "Satoshi", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: rgba(0, 0, 0, 0.02);
      --border: rgba(0, 0, 0, 0.08);
      --text: #0a0a0a;
      --text-muted: #71717a;
      --accent: #0070f3;
      --input-bg: rgba(0, 0, 0, 0.01);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    header { padding: 3rem 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; }

    /* Navigation Tabs */
    .mode-nav {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 1rem 0;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--accent);
    }

    /* Layout */
    .app-wrapper { display: grid; grid-template-columns: 1fr 450px; gap: 5rem; padding-bottom: 8rem; }
    .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; }
    .label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 1rem; display: block; }

    input { width: 100%; background: var(--input-bg); border: none; border-bottom: 1px solid var(--border); color: var(--text); padding: 0.75rem 0.5rem; font-size: 1rem; outline: none; margin-bottom: 1.5rem; }
    input:focus { border-color: var(--accent); }

    .btn { padding: 1rem 2rem; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 12px; transition: var(--transition); }
    .btn:hover { background: var(--text); color: var(--bg); }
    .btn-accent { background: var(--text); color: var(--bg); border: none; }

    .song-item { background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 16px; margin-bottom: 1.5rem; position: relative; }
    .btn-remove { position: absolute; right: 1rem; top: 1rem; border: none; background: none; color: var(--text-muted); cursor: pointer; }

    .sql-area { width: 100%; height: 450px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; color: var(--accent); font-family: var(--font-mono); font-size: 12px; line-height: 1.6; resize: none; outline: none; }

    #themeToggle { background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 12px; color: var(--text); cursor: pointer; font-size: 1.2rem; }

    /* Hidden utility */
    .hidden { display: none; }

    @media (max-width: 1000px) { .app-wrapper { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="container">
    <div class="logo">SQL.STUDIO</div>
    <button id="themeToggle"><span id="themeIcon">☼</span></button>
  </header>

  <main class="container">
    <nav class="mode-nav">
      <button class="tab-btn active" onclick="setMode('genre')">01 Genre Only</button>
      <button class="tab-btn" onclick="setMode('single')">02 Single Track</button>
      <button class="tab-btn" onclick="setMode('multi')">03 Multi Track</button>
    </nav>

    <div class="app-wrapper">
      <section id="input-section">
        
        <div id="mode-genre">
          <span class="label">Register Category</span>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <input type="text" id="g-name" placeholder="Genre Name">
            <input type="text" id="g-slug" placeholder="Slug">
          </div>
        </div>

        <div id="track-container" class="hidden">
          <span class="label">Target Slug</span>
          <input type="text" id="target-slug" placeholder="Reference Genre Slug (e.g. koplo)">
          
          <div id="songBuilder"></div>

          <div id="multi-tools" class="hidden" style="margin-bottom: 2rem;">
            <button class="btn" id="addSongBtn" style="padding: 0.5rem 1rem;">+ Add Row</button>
          </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button class="btn btn-accent" id="generateSqlBtn">Generate SQL</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </section>

      <aside>
        <div class="glass-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <span class="label" style="margin: 0;">SQL Statement</span>
            <button id="copyBtn" style="background:none; border:none; color:var(--text); font-size: 10px; font-weight: 800; cursor:pointer;">COPY</button>
          </div>
          <textarea id="sqlOutput" class="sql-area" readonly placeholder="Output murni..."></textarea>
        </div>
      </aside>
    </div>
  </main>

  <template id="songItemTemplate">
    <div class="song-item">
      <button class="btn-remove song-remove-btn">✕</button>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <input type="text" class="song-track-title" placeholder="Track Title">
        <input type="text" class="song-track-artist" placeholder="Artist">
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr 0.5fr; gap: 1.5rem;">
        <input type="url" class="song-track-url" placeholder="YouTube URL">
        <input type="text" class="song-track-video-id" placeholder="Video ID">
        <input type="number" class="song-track-order" placeholder="Sort">
      </div>
    </div>
  </template>

  <script>
    let currentMode = 'genre';

    const refs = {
      themeToggle: document.getElementById('themeToggle'),
      themeIcon: document.getElementById('themeIcon'),
      songBuilder: document.getElementById('songBuilder'),
      songItemTemplate: document.getElementById('songItemTemplate'),
      sqlOutput: document.getElementById('sqlOutput')
    };

    // Mode Controller
    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('mode-genre').classList.add('hidden');
      document.getElementById('track-container').classList.add('hidden');
      document.getElementById('multi-tools').classList.add('hidden');
      
      refs.songBuilder.innerHTML = '';

      if (mode === 'genre') {
        document.getElementById('mode-genre').classList.remove('hidden');
      } else {
        document.getElementById('track-container').classList.remove('hidden');
        addSongItem();
        if (mode === 'multi') document.getElementById('multi-tools').classList.remove('hidden');
      }
    }

    // Theme Switch
    refs.themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      refs.themeIcon.textContent = next === 'dark' ? '☼' : '☾';
    });

    // Auto Slugify untuk Mode 1
    document.getElementById('g-name').addEventListener('input', (e) => {
      document.getElementById('g-slug').value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '');
    });

    function addSongItem() {
      const clone = refs.songItemTemplate.content.cloneNode(true);
      const urlInput = clone.querySelector('.song-track-url');
      const idInput = clone.querySelector('.song-track-video-id');
      const orderInput = clone.querySelector('.song-track-order');
      
      orderInput.value = refs.songBuilder.children.length + 1;

      urlInput.addEventListener('input', (e) => {
        const id = e.target.value.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=|\&v=))([^#\&\?]*)/);
        if (id && id[1].length === 11) idInput.value = id[1];
      });

      clone.querySelector('.song-remove-btn').addEventListener('click', (e) => {
        if (currentMode === 'multi') e.target.closest('.song-item').remove();
      });

      refs.songBuilder.appendChild(clone);
    }

    function generateSql() {
      let sql = '';

      if (currentMode === 'genre') {
        const name = document.getElementById('g-name').value.trim().replace(/'/g, "''");
        const slug = document.getElementById('g-slug').value.trim();
        if (!name) return alert('Fill Genre Name');
        sql = `INSERT OR IGNORE INTO genres (name, slug) VALUES ('${name}', '${slug}');`;
      } 
      else {
        const slug = document.getElementById('target-slug').value.trim();
        if (!slug) return alert('Fill Target Genre Slug');

        const tracks = Array.from(refs.songBuilder.querySelectorAll('.song-item'));
        sql = `INSERT INTO tracks (genre_id, title, artist, youtube_url, youtube_video_id, sort_order) VALUES\n`;
        const values = tracks.map(t => {
          const title = t.querySelector('.song-track-title').value.replace(/'/g, "''");
          const artist = t.querySelector('.song-track-artist').value.replace(/'/g, "''");
          const url = t.querySelector('.song-track-url').value;
          const vid = t.querySelector('.song-track-video-id').value;
          const order = t.querySelector('.song-track-order').value;
          return `((SELECT id FROM genres WHERE slug = '${slug}'), '${title}', '${artist}', '${url}', '${vid}', ${order})`;
        });
        sql += values.join(',\n') + ';';
      }

      refs.sqlOutput.value = sql;
    }

    document.getElementById('addSongBtn').addEventListener('click', addSongItem);
    document.getElementById('generateSqlBtn').addEventListener('click', generateSql);
    document.getElementById('copyBtn').addEventListener('click', () => {
      refs.sqlOutput.select();
      document.execCommand('copy');
      const b = document.getElementById('copyBtn');
      b.textContent = 'COPIED';
      setTimeout(() => b.textContent = 'COPY', 2000);
    });
    document.getElementById('resetBtn').addEventListener('click', () => location.reload());
  </script>
</body>
</html>
