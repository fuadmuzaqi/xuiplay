<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Studio — Music Station</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&f[]=boska@300,400,500,700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Colors - Ultra Minimalist Dark */
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1c1c1c;
      --border: #262626;
      --text: #ffffff;
      --text-muted: #737373;
      --accent: #ffffff;
      --accent-text: #000000;
      --danger: #ef4444;
      
      --font-display: "Boska", serif;
      --font-body: "Satoshi", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --transition: all 0.15s ease;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --surface-hover: #eeeeee;
      --border: #e5e5e5;
      --text: #0a0a0a;
      --text-muted: #737373;
      --accent: #0a0a0a;
      --accent-text: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Header */
    header {
      padding: 3rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Main Layout */
    .app-grid {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 4rem;
      margin-top: 2rem;
      padding-bottom: 5rem;
    }

    /* Section Typography */
    .section-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      margin-bottom: 2.5rem;
      letter-spacing: -0.03em;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: block;
    }

    /* Input & Forms */
    input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 0;
      font-size: 1rem;
      transition: var(--transition);
      outline: none;
      border-radius: 0;
    }

    input:focus {
      border-color: var(--accent);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    /* Song Item */
    .song-item {
      padding: 2rem;
      background: var(--surface);
      border-radius: 4px;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .song-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.25rem;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 2px;
      transition: var(--transition);
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      opacity: 0.9;
      background: var(--accent);
    }

    .btn-remove {
      color: var(--text-muted);
      border: none;
      padding: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-remove:hover { color: var(--danger); background: none; }

    /* Output */
    .output-sticky {
      position: sticky;
      top: 3rem;
    }

    .sql-code {
      width: 100%;
      height: 500px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 1.5rem;
      font-family: var(--font-mono);
      font-size: 12px;
      border-radius: 4px;
      resize: none;
      outline: none;
    }

    #themeToggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }

    /* Utils */
    .full-width { grid-column: span 2; }
    .mb-4 { margin-bottom: 1rem; }

    @media (max-width: 900px) {
      .app-grid { grid-template-columns: 1fr; gap: 3rem; }
      .output-sticky { position: static; }
      .form-row { grid-template-columns: 1fr; gap: 1rem; }
      .full-width { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <header class="container">
    <div class="brand">Music Station.</div>
    <button id="themeToggle">LIGHT MODE</button>
  </header>

  <main class="container">
    <div class="app-grid">
      <section>
        <h1 class="section-title">SQL Generator</h1>

        <div class="mb-4">
          <span class="label">01. Genre Details</span>
          <div class="form-row">
            <div>
              <input type="text" id="genreName" placeholder="Name">
            </div>
            <div>
              <input type="text" id="genreSlug" placeholder="Slug">
            </div>
          </div>
        </div>

        <div class="mb-4">
          <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem;">
            <span class="label" style="margin: 0;">02. Tracklist</span>
            <button class="btn" id="addSongBtn">+ Add</button>
          </div>

          <div id="songBuilder"></div>

          <div style="display: flex; gap: 1rem; margin-top: 3rem;">
            <button class="btn btn-primary" id="generateSqlBtn" style="padding: 1rem 2rem;">GENERATE STATEMENT</button>
            <button class="btn" id="resetBtn">RESET</button>
          </div>
        </div>
      </section>

      <aside>
        <div class="output-sticky">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <span class="label" style="margin: 0;">SQL Output</span>
            <button class="btn-remove" id="copyBtn" style="border: none;">Copy to clipboard</button>
          </div>
          <textarea id="sqlOutput" class="sql-code" readonly placeholder="No output generated..."></textarea>
        </div>
      </aside>
    </div>
  </main>

  <template id="songItemTemplate">
    <div class="song-item">
      <div class="song-item-header">
        <span class="label" style="margin: 0; color: var(--text);">Track #<span class="count">1</span></span>
        <button class="btn-remove song-remove-btn">Remove</button>
      </div>
      <div class="form-row">
        <div>
          <label class="label">Title</label>
          <input type="text" class="song-track-title">
        </div>
        <div>
          <label class="label">Artist</label>
          <input type="text" class="song-track-artist">
        </div>
        <div class="full-width">
          <label class="label">URL</label>
          <input type="url" class="song-track-url" placeholder="youtube.com/...">
        </div>
        <div>
          <label class="label">Video ID</label>
          <input type="text" class="song-track-video-id">
        </div>
        <div>
          <label class="label">Order</label>
          <input type="number" class="song-track-order">
        </div>
      </div>
    </div>
  </template>

  <script>
    const refs = {
      themeToggle: document.getElementById('themeToggle'),
      genreName: document.getElementById('genreName'),
      genreSlug: document.getElementById('genreSlug'),
      addSongBtn: document.getElementById('addSongBtn'),
      generateSqlBtn: document.getElementById('generateSqlBtn'),
      resetBtn: document.getElementById('resetBtn'),
      songBuilder: document.getElementById('songBuilder'),
      songItemTemplate: document.getElementById('songItemTemplate'),
      sqlOutput: document.getElementById('sqlOutput'),
      copyBtn: document.getElementById('copyBtn')
    };

    let currentTheme = 'dark';

    // Theme Switcher
    refs.themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      refs.themeToggle.textContent = currentTheme === 'dark' ? 'LIGHT MODE' : 'DARK MODE';
    });

    // Auto Slug
    refs.genreName.addEventListener('input', (e) => {
      refs.genreSlug.value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '');
    });

    function addSongItem() {
      const clone = refs.songItemTemplate.content.cloneNode(true);
      const items = refs.songBuilder.querySelectorAll('.song-item').length + 1;
      clone.querySelector('.count').textContent = items;
      clone.querySelector('.song-track-order').value = items;

      const urlInput = clone.querySelector('.song-track-url');
      const idInput = clone.querySelector('.song-track-video-id');

      urlInput.addEventListener('input', (e) => {
        const match = e.target.value.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=|\&v=))([^#\&\?]*)/);
        if (match && match[1].length === 11) idInput.value = match[1];
      });

      clone.querySelector('.song-remove-btn').addEventListener('click', (e) => {
        e.target.closest('.song-item').remove();
        updateIndices();
      });

      refs.songBuilder.appendChild(clone);
    }

    function updateIndices() {
      refs.songBuilder.querySelectorAll('.song-item').forEach((item, i) => {
        item.querySelector('.count').textContent = i + 1;
      });
    }

    function generateSql() {
      const gName = refs.genreName.value.trim().replace(/'/g, "''");
      const gSlug = refs.genreSlug.value.trim();

      if (!gName) return alert('Fill genre name');

      let sql = `INSERT OR IGNORE INTO genres (name, slug) VALUES ('${gName}', '${gSlug}');\n\n`;
      
      const tracks = Array.from(refs.songBuilder.querySelectorAll('.song-item'));
      if (tracks.length > 0) {
        sql += `INSERT INTO tracks (genre_id, title, artist, youtube_url, youtube_video_id, sort_order) VALUES\n`;
        const values = tracks.map(t => {
          const title = t.querySelector('.song-track-title').value.replace(/'/g, "''");
          const artist = t.querySelector('.song-track-artist').value.replace(/'/g, "''");
          const url = t.querySelector('.song-track-url').value;
          const vid = t.querySelector('.song-track-video-id').value;
          const order = t.querySelector('.song-track-order').value;
          return `((SELECT id FROM genres WHERE slug = '${gSlug}'), '${title}', '${artist}', '${url}', '${vid}', ${order})`;
        });
        sql += values.join(',\n') + ';';
      }

      refs.sqlOutput.value = sql;
    }

    refs.addSongBtn.addEventListener('click', addSongItem);
    refs.generateSqlBtn.addEventListener('click', generateSql);
    refs.resetBtn.addEventListener('click', () => confirm('Reset?') && location.reload());
    refs.copyBtn.addEventListener('click', () => {
      refs.sqlOutput.select();
      document.execCommand('copy');
      refs.copyBtn.textContent = 'Copied';
      setTimeout(() => refs.copyBtn.textContent = 'Copy to clipboard', 2000);
    });

    // Init
    addSongItem();
  </script>
</body>
</html>
