<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Studio — Intelligence</title>
  
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=boska@300,400,500,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #a1a1aa;
      --accent: #00f2ff;
      --input-bg: rgba(255, 255, 255, 0.02);
      --font-display: "Boska", serif;
      --font-body: "Satoshi", sans-serif;
      --font-mono: "JetBrains Mono", monospace;
      --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: rgba(0, 0, 0, 0.02);
      --border: rgba(0, 0, 0, 0.08);
      --text: #0a0a0a;
      --text-muted: #71717a;
      --accent: #0070f3;
      --input-bg: rgba(0, 0, 0, 0.01);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background-color 0.4s; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

    header { padding: 3rem 0; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; }

    /* Tabs */
    .mode-nav { display: flex; gap: 2rem; margin-bottom: 3rem; border-bottom: 1px solid var(--border); }
    .tab-btn { background: none; border: none; color: var(--text-muted); padding: 1rem 0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; position: relative; transition: var(--transition); }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent); }

    /* UI Components */
    .app-wrapper { display: grid; grid-template-columns: 1fr 450px; gap: 5rem; padding-bottom: 8rem; }
    .glass-card { background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; }
    .label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-muted); margin-bottom: 1rem; display: block; }

    input { width: 100%; background: var(--input-bg); border: none; border-bottom: 1px solid var(--border); color: var(--text); padding: 1rem 0.5rem; font-size: 1rem; outline: none; margin-bottom: 1.5rem; transition: var(--transition); }
    input:focus { border-color: var(--accent); background: rgba(255,255,255,0.04); }
    input::placeholder { color: var(--text-muted); opacity: 0.3; }

    .btn { padding: 1rem 2rem; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 12px; transition: var(--transition); }
    .btn:hover { background: var(--text); color: var(--bg); }
    .btn-accent { background: var(--text); color: var(--bg); border: none; }

    .song-item { background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem; position: relative; border: 1px solid transparent; transition: var(--transition); }
    .song-item:hover { border-color: var(--border); }
    .btn-remove { position: absolute; right: 1.5rem; top: 1.5rem; border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }

    .sql-area { width: 100%; height: 480px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; color: var(--accent); font-family: var(--font-mono); font-size: 12px; line-height: 1.6; resize: none; outline: none; }

    #themeToggle { background: var(--surface); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 12px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .loading-pulse { animation: pulse 1.5s infinite; opacity: 0.5; }
    @keyframes pulse { 0% { color: var(--text-muted); } 50% { color: var(--accent); } 100% { color: var(--text-muted); } }

    .hidden { display: none; }
    @media (max-width: 1000px) { .app-wrapper { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="container">
    <div class="logo">SQL.STUDIO</div>
    <button id="themeToggle"><span id="themeIcon">☼</span></button>
  </header>

  <main class="container">
    <nav class="mode-nav">
      <button class="tab-btn active" onclick="setMode('genre', this)">Genre Only</button>
      <button class="tab-btn" onclick="setMode('single', this)">Single Track</button>
      <button class="tab-btn" onclick="setMode('multi', this)">Multi Track</button>
    </nav>

    <div class="app-wrapper">
      <section>
        <div id="mode-genre">
          <span class="label">Register New Genre</span>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <input type="text" id="g-name" placeholder="Genre Name (ex: Dangdut Koplo)">
            <input type="text" id="g-slug" placeholder="Auto-generated slug">
          </div>
        </div>

        <div id="track-container" class="hidden">
          <span class="label">Reference Genre Slug</span>
          <input type="text" id="target-slug" placeholder="Target Slug (ex: koplo)">
          
          <div id="songBuilder"></div>

          <div id="multi-tools" class="hidden" style="margin-top: 1rem;">
            <button class="btn" id="addSongBtn" style="padding: 0.6rem 1.2rem; font-size: 10px;">+ Add More</button>
          </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 3rem;">
          <button class="btn btn-accent" id="generateSqlBtn">Generate Statement</button>
          <button class="btn" id="resetBtn">Clear</button>
        </div>
      </section>

      <aside>
        <div class="glass-card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <span class="label" style="margin: 0;">SQL Output</span>
            <button id="copyBtn" style="background:none; border:none; color:var(--text); font-size: 10px; font-weight: 800; cursor:pointer;">COPY</button>
          </div>
          <textarea id="sqlOutput" class="sql-area" readonly placeholder="Result will be here..."></textarea>
        </div>
      </aside>
    </div>
  </main>

  <template id="songItemTemplate">
    <div class="song-item">
      <button class="btn-remove song-remove-btn">✕</button>
      <div style="margin-bottom: 1.5rem;">
        <label class="label" style="font-size: 8px;">YouTube Link (Main Driver)</label>
        <input type="url" class="song-track-url" placeholder="Paste link here to auto-fill everything...">
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
        <div>
          <label class="label" style="font-size: 8px;">Title</label>
          <input type="text" class="song-track-title" placeholder="Auto-filled title">
        </div>
        <div>
          <label class="label" style="font-size: 8px;">Artist</label>
          <input type="text" class="song-track-artist" placeholder="Auto-filled artist">
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
        <div>
          <label class="label" style="font-size: 8px;">Video ID</label>
          <input type="text" class="song-track-video-id" placeholder="Auto-filled ID">
        </div>
        <div>
          <label class="label" style="font-size: 8px;">Sort Order</label>
          <input type="number" class="song-track-order">
        </div>
      </div>
    </div>
  </template>

  <script>
    let currentMode = 'genre';

    // Helper: Capitalize Each Word
    function toTitleCase(str) {
      if (!str) return '';
      return str.toLowerCase().split(' ').map(word => {
        return word.charAt(0).toUpperCase() + word.slice(1);
      }).join(' ');
    }

    // Helper: Smart Data Fetcher
    async function autoFillFromYoutube(url, row) {
      const idMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:v\/|u\/\w\/|embed\/|watch\?v=|\&v=))([^#\&\?]*)/);
      if (!idMatch || idMatch[1].length !== 11) return;

      const videoId = idMatch[1];
      const titleInput = row.querySelector('.song-track-title');
      const artistInput = row.querySelector('.song-track-artist');
      const idInput = row.querySelector('.song-track-video-id');

      idInput.value = videoId;
      titleInput.placeholder = "Fetching data...";
      titleInput.classList.add('loading-pulse');

      try {
        // Menggunakan oEmbed (No API Key Required)
        const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
        const data = await response.json();
        
        if (data) {
          // Bersihkan judul dari simbol aneh yang sering ada di YT
          let cleanTitle = data.title.split('(')[0].split('[')[0].trim();
          titleInput.value = toTitleCase(cleanTitle);
          artistInput.value = toTitleCase(data.author_name.replace(' - Topic', '').trim());
        }
      } catch (e) {
        console.error("Gagal mengambil data otomatis", e);
      } finally {
        titleInput.classList.remove('loading-pulse');
        titleInput.placeholder = "Title";
      }
    }

    // UI Controller
    function setMode(mode, btn) {
      currentMode = mode;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.getElementById('mode-genre').classList.add('hidden');
      document.getElementById('track-container').classList.add('hidden');
      document.getElementById('multi-tools').classList.add('hidden');
      document.getElementById('songBuilder').innerHTML = '';

      if (mode === 'genre') {
        document.getElementById('mode-genre').classList.remove('hidden');
      } else {
        document.getElementById('track-container').classList.remove('hidden');
        addSongItem();
        if (mode === 'multi') document.getElementById('multi-tools').classList.remove('hidden');
      }
    }

    function addSongItem() {
      const template = document.getElementById('songItemTemplate');
      const clone = template.content.cloneNode(true);
      const row = clone.querySelector('.song-item');
      
      const urlInput = clone.querySelector('.song-track-url');
      const orderInput = clone.querySelector('.song-track-order');
      orderInput.value = document.getElementById('songBuilder').children.length + 1;

      urlInput.addEventListener('change', (e) => autoFillFromYoutube(e.target.value, row));

      clone.querySelector('.song-remove-btn').addEventListener('click', (e) => {
        if (currentMode === 'multi') e.target.closest('.song-item').remove();
      });

      document.getElementById('songBuilder').appendChild(clone);
    }

    // Logic: Theme & Slug
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeIcon').textContent = isDark ? '☾' : '☼';
    });

    document.getElementById('g-name').addEventListener('input', (e) => {
      document.getElementById('g-slug').value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]+/g, '');
    });

    // Logic: Generator
    function generateSql() {
      let sql = '';
      if (currentMode === 'genre') {
        const name = toTitleCase(document.getElementById('g-name').value.trim());
        const slug = document.getElementById('g-slug').value.trim();
        if (!name) return;
        sql = `INSERT OR IGNORE INTO genres (name, slug) VALUES ('${name.replace(/'/g, "''")}', '${slug}');`;
      } else {
        const slug = document.getElementById('target-slug').value.trim();
        const tracks = Array.from(document.querySelectorAll('.song-item'));
        if (!slug || tracks.length === 0) return alert('Fill Target Slug');

        sql = `INSERT INTO tracks (genre_id, title, artist, youtube_url, youtube_video_id, sort_order) VALUES\n`;
        const vals = tracks.map(t => {
          const title = toTitleCase(t.querySelector('.song-track-title').value.replace(/'/g, "''"));
          const artist = toTitleCase(t.querySelector('.song-track-artist').value.replace(/'/g, "''"));
          const url = t.target = t.querySelector('.song-track-url').value;
          const vid = t.querySelector('.song-track-video-id').value;
          const ord = t.querySelector('.song-track-order').value;
          return `((SELECT id FROM genres WHERE slug = '${slug}'), '${title}', '${artist}', '${url}', '${vid}', ${ord})`;
        });
        sql += vals.join(',\n') + ';';
      }
      document.getElementById('sqlOutput').value = sql;
    }

    document.getElementById('addSongBtn').addEventListener('click', addSongItem);
    document.getElementById('generateSqlBtn').addEventListener('click', generateSql);
    document.getElementById('copyBtn').addEventListener('click', () => {
      const out = document.getElementById('sqlOutput');
      out.select();
      document.execCommand('copy');
      document.getElementById('copyBtn').textContent = 'COPIED';
      setTimeout(() => document.getElementById('copyBtn').textContent = 'COPY', 2000);
    });
    document.getElementById('resetBtn').addEventListener('click', () => location.reload());
  </script>
</body>
</html>
