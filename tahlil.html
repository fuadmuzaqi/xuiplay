<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majelis Digital - Tahlil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2c;
            --accent: #34d399;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            background: linear-gradient(to bottom, #161b2c, #0b0f1a);
        }

        .tab-nav {
            position: sticky;
            top: 0;
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 10px;
            z-index: 1000;
            border-bottom: 1px solid #2d3748;
        }

        .tab-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0b0f1a;
            font-weight: 600;
            border-color: var(--accent);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .loader {
            text-align: center;
            padding: 50px;
            display: none;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2d3748;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            text-align: right;
            line-height: 2.5;
            margin-bottom: 15px;
            color: #fff;
            direction: rtl;
        }

        .latin {
            font-style: italic;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .translation {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            border-top: 1px solid #2d3748;
            padding-top: 10px;
        }

        .nomor {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>Majelis Digital</h1>
    <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">Yasin, Tahlil & Doa sesuai panduan</p>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="loadContent('tahlil', this)">Tahlil</button>
    <button class="tab-btn" onclick="loadContent('yasin', this)">Yasin</button>
    <button class="tab-btn" onclick="loadContent('doa', this)">Doa</button>
</div>

<div class="container">
    <div id="loader" class="loader">Memuat data...</div>
    <div id="main-content"></div>
</div>

<script>
    const contentDiv = document.getElementById('main-content');
    const loader = document.getElementById('loader');

    // Data Tahlil Berdasarkan Gambar (Hal 45-52)
    const DATA_TAHLIL_LOKAL = [
        {
            title: "Hadlarah Rasulullah SAW",
            arabic: "اِلَى حَضْرَةِ النَّبِيِّ الْمُصْطَفَى صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ وَاٰلِهِ وَاَزْوَاجِهِ وَاَوْلَادِهِ وَذُرِّيَّاتِهِ، اَلْفَاتِحَة",
            latin: "Ilaa hadharatin nabiyyil mushthafaa shallallaahu 'alaihi wa sallama wa aalihii wa azwaajihii wa aulaadihii wa dzurriyyaatihii, Al-Faatihah:",
            translation: "Semoga ke hadirat Nabi Muhammad Saw., keluarganya, para istrinya, anak-anaknya, dan para keturunannya, Al-Fatihah."
        },
        {
            title: "Hadlarah Para Nabi, Sahabat, dan Syaikh Abdul Qadir Al-Jailani",
            arabic: "ثُمَّ اِلَى حَضْرَةِ اِخْوَانِهِ مِنَ الْاَنْبِيَاءِ وَالْمُرْسَلِيْنَ وَالْاَوْلِيَاءِ وَالشُّهَدَاءِ وَالصَّالِحِيْنَ وَالصَّحَابَةِ وَالتَّابِعِيْنَ وَالْعُلَمَاءِ الْعَامِلِيْنَ وَالْمُصَنِّفِيْنَ الْمُخْلِصِيْنَ وَجَمِيْعِ الْمَلَائِكَةِ الْمُقَرَّبِيْنَ، خُصُوْصًا سَيِّدِنَا الشَّيْخِ عَبْدِ الْقَادِرِ الْجَيْلَانِيِّ، اَلْفَاتِحَة",
            latin: "Tsumma ilaa hadharaati ikhwaanihii minal ambiyaa-i wal mursaliin, wal auliyaa-i wassyuhadaa-i wasshhaalihiin, wal mushannifiinal mukhlishiin, wa jamii'il malaa-ikatil muqarrabiin, khushushan Sayyidinasy-Syaikha 'Abdul Qaadir Al-Jailaanii, Al-Faatihah:",
            translation: "Semoga juga tertuju kepada para nabi dan rasul, para wali, orang-orang yang mati syahid, orang saleh, para sahabat, tabiin, para ulama yang mengamalkan ilmunya, para pengarang yang ikhlas, dan kepada para malaikat yang selalu mendekatkan diri kepada Allah Swt., terutama penghulu kita Syekh Abdul Qadir Jailani, Al-Fatihah."
        },
        {
            title: "Ahli Kubur Seluruh Muslimin",
            arabic: "ثُمَّ اِلَى جَمِيْعِ اَهْلِ الْقُبُوْرِ مِنَ الْمُسْلِمِيْنَ وَالْمُسْلِمَاتِ وَالْمُؤْمِنِيْنَ وَالْمُؤْمِنَاتِ مِنْ مَشَارِقِ الْاَرْضِ اِلَى مَغَارِبِهَا بَرِّهَا وَبَحْرِهَا، خُصُوْصًا اٰبَاءَنَا وَاُمَّهَاتِنَا وَاَجْدَادَنَا وَجَدَّاتِنَا وَمَشَايِخَنَا وَمَشَايِخَ مَشَايِخِنَا وَاَسَاتِذَتِنَا وَاَسَاتِذَةِ اَسَاتِذَتِنَا وَلِمَنِ اجْتَمَعْنَا هٰهُنَا بِسَبَبِهِ، اَلْفَاتِحَة",
            latin: "Tsumma ilaa jamii'i ahlil qubuur, minal muslimiina wal muslimaat, wal mu'miniina wal mu'minaat, mim masyaariqil ardhi ilaa maghaaribihaa barrihaa wa bahrihaa. Khushushan ilaa aabaa-inaa wa ummahaatinaa wa ajdaadinaa wa jaddaatinaa wa masyaayikhinaa wa masyaayikhi masyaayikhinaa wa asaatidzatinaa wa asaatidzati asaatidzatinaa wa limanij-tama'naa haahunaa bisababihii, Al-Faatihah:",
            translation: "Juga kepada seluruh ahli kubur dari kaum muslimin, muslimat, mukminin, mukminat dari belahan bumi sebelah timur sampai barat, baik yang di daratan maupun yang di lautan; khususnya kepada para bapak, ibu, kakek, nenek, para guru, guru besar kami, kepada ustadz kami dan ustadznya ustadz kami, dan kepada orang yang menyebabkan kami semua dapat berkumpul di sini, Al-Fatihah."
        },
        {
            title: "Surah Al-Ikhlas (3x)",
            arabic: "بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ. قُلْ هُوَ اللهُ اَحَدٌ. اَللهُ الصَّمَدُ. لَمْ يَلِدْ وَلَمْ يُوْلَدْ. وَلَمْ يَكُنْ لَّهُ كُفُوًا اَحَدٌ (×٣)",
            latin: "Bismillaahir-rahmaanir-rahiim. Qul huwallaahu ahad. Allaahush-shamad. Lam yalid wa lam yuulad. Wa lam yakul lahuu kufuwan ahad (3x).",
            translation: "Dengan menyebut nama Allah yang Maha Pemurah lagi Maha Penyayang. Katakanlah: Dialah Allah, Yang Maha Esa. Allah adalah Tuhan yang bergantung kepada-Nya segala sesuatu. Dia tiada beranak dan tidak pula diperanakkan, dan tidak ada seorangpun yang setara dengan Dia."
        }
    ];

    async function loadContent(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        contentDiv.innerHTML = '';
        loader.style.display = 'block';
        window.scrollTo(0, 0);

        try {
            if (type === 'tahlil') {
                // Menggunakan data hasil konversi gambar
                renderTahlilManual(DATA_TAHLIL_LOKAL);
            } else if (type === 'yasin') {
                const res = await fetch("https://equran.id/api/v2/surat/36");
                const data = await res.json();
                renderYasin(data.data.ayat);
            } else if (type === 'doa') {
                const res = await fetch("https://islamic-api-zhirrr.vercel.app/api/doatahlil");
                const data = await res.json();
                renderGeneral(data.data);
            }
        } catch (error) {
            contentDiv.innerHTML = `<p style="text-align:center; color:red;">Gagal memuat data. Periksa koneksi internet.</p>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    function renderTahlilManual(items) {
        let html = '';
        items.forEach((item, index) => {
            html += `
                <div class="card">
                    <div class="nomor">${index + 1}</div>
                    <h3 style="margin-bottom:15px; color:var(--accent); font-size:1.1rem;">${item.title}</h3>
                    <div class="arabic">${item.arabic}</div>
                    <div class="latin">${item.latin}</div>
                    <div class="translation"><strong>Artinya:</strong> ${item.translation}</div>
                </div>
            `;
        });
        contentDiv.innerHTML = html;
    }

    function renderYasin(ayats) {
        let html = '<h2 style="text-align:center; margin-bottom:20px; color:var(--accent);">Surah Yasin</h2>';
        ayats.forEach(ayat => {
            html += `
                <div class="card">
                    <div class="nomor">${ayat.nomorAyat}</div>
                    <div class="arabic">${ayat.teksArab}</div>
                    <div class="translation">${ayat.teksIndonesia}</div>
                </div>
            `;
        });
        contentDiv.innerHTML = html;
    }

    function renderGeneral(items) {
        let html = '';
        items.forEach((item, index) => {
            html += `
                <div class="card">
                    <div class="nomor">${index + 1}</div>
                    <h3 style="margin-bottom:10px; color:var(--accent); font-size:1rem;">${item.title || item.doa}</h3>
                    <div class="arabic">${item.arabic}</div>
                    <div class="translation">${item.translation || item.id}</div>
                </div>
            `;
        });
        contentDiv.innerHTML = html;
    }

    window.onload = () => {
        document.querySelector('.tab-btn').click();
    };
</script>

</body>
</html>
