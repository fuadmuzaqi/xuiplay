<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Music Station | Premium Player</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo-mark"></div>
      <h1>Music<span>Station</span></h1>
    </div>
    <button id="themeToggle" class="theme-btn">☀</button>
  </header>

  <main class="app-container">
    <section class="player-card">
      <div class="display-zone">
        <h2 id="nowTitle">Ready to Play</h2>
        <p id="nowArtist" class="artist-name">Pilih lagu dari playlist</p>
      </div>

      <div class="scrubber-container">
        <div class="time-info">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
        <input type="range" id="timeBar" value="0" min="0" max="100" step="0.1">
      </div>

      <div class="main-controls">
        <button id="prevBtn" class="nav-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playPauseBtn" class="master-play">▶</button>
        <button id="nextBtn" class="nav-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </section>

    <section class="content-card">
      <nav class="genre-wrapper">
        <div id="genreTabs" class="genre-list"></div>
      </nav>

      <div class="list-meta">
        <h3 id="genreHeading">Semua Lagu</h3>
        <span id="trackCount">0 tracks</span>
      </div>

      <div id="playlistContainer" class="tracks-stack">
        </div>
    </section>
  </main>

  <div id="youtube-player" class="yt-engine"></div>

  <script src="./js/app.js"></script>
</body>
</html>
