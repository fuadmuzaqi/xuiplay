<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Music Station</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">♪</div>
      <h1>Music<span>Station</span></h1>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="installBtn" style="display: none;" title="Instal">⬇</button>
      <button class="icon-btn" id="clearCacheBtn" title="Hapus Cache">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
      <button class="icon-btn" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
      <button class="icon-btn" id="themeToggle">☀</button>
    </div>
  </header>

  <main class="main-shell">
    <section class="player-card">
      <div class="now-playing">
        <h2 id="nowTitle">Pilih Lagu</h2>
        <p id="nowArtist" class="muted">Siap memutar musik</p>
      </div>

      <div class="scrubber-container">
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="durationTime">0:00</span>
        </div>
        <input type="range" id="timeBar" value="0" min="0" max="100" step="0.1">
      </div>

      <div class="controls">
        <button id="prevBtn" class="control-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playPauseBtn" class="play-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="nextBtn" class="control-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </section>

    <section class="playlist-card">
      <header class="section-header">
        <div class="header-info">
          <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          <h3 id="genreHeading">Folders</h3>
        </div>
        <span id="trackCount" class="badge">0 track</span>
      </header>

      <nav class="genre-nav">
        <div id="genreTabs" class="genre-tabs"></div>
      </nav>

      <div id="playlistContainer" class="playlist-list">
        </div>
    </section>
  </main>

  <div id="youtube-player" class="yt-hidden"></div>
  <script src="./js/app.js"></script>
</body>
</html>
